services:
  - type: web
    name: churnsight
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MODEL_PATH
        value: adaboost_model.pkl
      - key: SCALER_PATH
        value: scaler.pkl
