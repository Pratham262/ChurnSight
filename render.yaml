services:
  - type: web
    name: churnsight
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MODEL_PATH
        value: adaboost_model.pkl
      - key: SCALER_PATH
        value: scaler.pkl
